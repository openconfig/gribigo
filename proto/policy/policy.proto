syntax = "proto3";

package gribi.policy;

option go_package = "github.com/openconfig/gribigo/proto/policy";

message IPv4PrefixPolicy {
  // Allowed prefixes for the group.
  repeated string allowed_prefixes = 1;
}

message GroupPolicy {
  // Constraint for IPv4 prefixes.
  IPv4PrefixPolicy ipv4_policy = 1;
}
